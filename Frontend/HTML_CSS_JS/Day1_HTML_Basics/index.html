<!DOCTYPE html>
<html>
<head>

</head>
<body>

    <!-- Heading -->
    <h1>WebPage</h1>
    <h2>Meee</h2>

    <p>Hello! My name is Suraj.</p>

    <!-- Line Break -->
    <p>Suraj Chopade<br>Coding</p>

    <!-- Horizontal Line -->

    <!-- Unordered List -->
    <ul>
        <li>Milk</li>
        <li>Pohaa</li>
        <li>Bread</li>
    </ul>

    <!-- Ordered List -->
    <ol>
        <li>Book</li>
        <li>Pen</li>

    </ol>

    <!-- Link -->
    <p>
        <a href="https://github.com" target="_blank">Click Here</a>

    <!-- Image -->
    <img src="https://via.placeholder.com/200" alt="Image">

</html>
