<!DOCTYPE html>
<html>
<head>
    <title>HTML Advanced</title>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <section>
        <h2>Student Table</h2>

        <!-- Table -->
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
            </tr>
            <tr>
                <td>Suraj</td>
                <td>22</td>
                <td>Java</td>
            </tr>
            <tr>
                <td>Rahul</td>
                <td>23</td>
                <td>React</td>
            </tr>
        </table>
    </section>

    <section>
        <h2>Registration Form</h2>

        <!-- Form -->
        <form>
            Name: <input type="text"><br><br>
            Email: <input type="email"><br><br>
            Password: <input type="password"><br><br>
            Age: <input type="number"><br><br>

            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

            Skills:
            <input type="checkbox"> Java
            <input type="checkbox"> Python

            <input type="submit" value="Register">
        </form>
    </section>

    <footer>
        <p>My Website</p>
    </footer>

</body>
</html>
